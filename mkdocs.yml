site_name: popn.gg Refactor Docs
site_description: popn.gg refactor context, architecture, migration, and API notes
site_url: https://docs.popn.gg/
repo_name: popngg

theme:
  name: material
  language: ko
  palette:
    - scheme: default
      primary: white
      accent: teal
  features:
    - navigation.instant
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.path
    - navigation.top
    - navigation.footer
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy

plugins:
  - search:
      lang:
        - ko
        - en

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.blocks.html
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_div_format
  - pymdownx.tasklist:
      custom_checkbox: true
  - tables

extra_css:
  - assets/stylesheets/extra.css

extra_javascript:
  - https://unpkg.com/mermaid@10/dist/mermaid.min.js
  - assets/javascripts/mermaid-init.js

nav:
  - 홈: index.md
  - 회의해야 할 것:
      - 개요: meetings/index.md
      - 데이터 모델링: meetings/data-modeling.md
      - songhash 생성 규칙: meetings/songhash.md
      - Upper 모델링: meetings/upper-modeling.md
      - LONG POP ON/OFF: meetings/long-pop.md
  - 기획:
      - 개요: planning/index.md
      - 프로젝트 개요: planning/overview.md
      - MVP 범위: planning/mvp-scope.md
      - 서비스와 게임 리서치: planning/service-research.md
      - 게임 시스템: game-system.md
  - 설계:
      - 개요: design/index.md
      - 아키텍처: architecture.md
      - 기존 DB 구조: legacy-db-inference.md
      - MVP DB 설계 초안: mvp-db-design.md
      - 데이터 모델링: data-modeling.md
      - 마이그레이션 계획: migration-plan.md
      - 의사결정 기록: decisions.md
  - API:
      - 개요: api/index.md
      - API 설계: api-design.md
      - API Reference: api-reference.md
  - 컨벤션:
      - 개요: conventions/index.md
      - 문서 컨벤션: conventions/docs.md
      - 코드 컨벤션: conventions/code.md
      - DB 컨벤션: conventions/database.md
      - Git 컨벤션: conventions/git.md
  - 운영:
      - 운영과 배포: operations.md
  - LLM 컨텍스트: llm-context.md
